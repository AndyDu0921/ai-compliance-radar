name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      DEPLOY_URL: https://radar.dssxhydwp.shop
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Apply D1 migrations
        run: npm run db:migrate:remote

      - name: Deploy Worker
        run: |
          DEPLOYED_AT="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          npx wrangler deploy \
            --keep-vars \
            --var APP_VERSION:${GITHUB_SHA} \
            --var APP_DEPLOYED_AT:${DEPLOYED_AT} \
            --message "GitHub Actions deploy ${GITHUB_SHA}"

      - name: Smoke test deployment
        run: |
          python - <<'PY'
          import json
          import urllib.request

          base = "https://radar.dssxhydwp.shop"
          headers = {"User-Agent": "GitHub-Actions-Smoke-Test/1.0"}

          def fetch(url):
              req = urllib.request.Request(url, headers=headers)
              with urllib.request.urlopen(req, timeout=30) as resp:
                  return resp.read().decode("utf-8")

          html = fetch(base)
          assert "/js/main.js" in html, "Expected latest frontend asset path in homepage HTML"

          health = json.loads(fetch(f"{base}/health"))
          assert health["status"] == "ok", "Health endpoint did not return ok"
          assert health["version"] == "${{ github.sha }}", f"Unexpected deployed version: {health['version']}"

          meta = json.loads(fetch(f"{base}/api/v1/meta"))
          assert meta["allowed_uploads"] == [".txt", ".md"], f"Unexpected uploads: {meta['allowed_uploads']}"
          PY
