name = "ai-compliance-radar"
main = "src/worker.ts"
compatibility_date = "2025-04-01"

[assets]
directory = "./public"
binding = "ASSETS"

[[routes]]
pattern = "radar.dssxhydwp.shop"
custom_domain = true

[[d1_databases]]
binding = "DB"
database_name = "ai_compliance_radar_db"
database_id = "5adb995f-401c-4a85-9f06-19ff2cc69f07"
migrations_dir = "migrations"

[vars]
APP_NAME = "Compliance Radar"
APP_VERSION = "0.2.0"
APP_DEPLOYED_AT = ""
MAX_UPLOAD_MB = "10"
DEFAULT_USE_LLM = "false"
STORE_RAW_INPUT = "false"
JOB_RETENTION_DAYS = "7"
